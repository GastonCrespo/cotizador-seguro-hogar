<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Workshop - Cotizador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SOLO EL MAIN -->
    <script type="module" src="/src/js/main.js"></script>
</head>

<body>

    <h1 class="center separate">Seguros del hogar</h1>

    <div class="div-quote">

        <h2 class="center separate">
            Completa los datos solicitados
        </h2>

        <!-- PROPIEDAD -->
        <label for="propiedad">Selecciona el tipo de propiedad</label>
        <select id="propiedad">
            <option selected disabled>Seleccione...</option>
        </select>

        <!-- UBICACION -->
        <label for="ubicacion">Selecciona su ubicación</label>
        <select id="ubicacion">
            <option selected disabled>Seleccione...</option>
        </select>

        <!-- METROS -->
        <label for="metros2">Ingresa los Metros cuadrados:</label>
        <input type="number" id="metros2" value="20" min="20" max="500">

        <!-- BOTON -->
        <div class="center separate">
            <button id="btnCotizar" class="button button-outline">
                Cotizar
            </button>
        </div>

        <!-- RESULTADO -->
        <div class="center separate">
            <p class="price">
                Precio estimado: $
                <span id="valorPoliza">0.00</span>
            </p>
        </div>

    </div>

</body>
</html>
